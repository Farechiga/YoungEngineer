<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young Engineer Math</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #9b59b6);
        }

        /* --- PUP LOGO --- */
        #puppy-logo {
            position: fixed; 
            top: 20px;
            left: 20px;
            width: 140px;
            z-index: 9999; /* This keeps him on top of the gradient */
            mix-blend-mode: multiply; /* Removes white background */
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 21s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem; border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center; max-width: 650px; width: 90%;
            position: relative; z-index: 10;
        }

        h2 { color: #333; font-size: 1.8rem; margin-bottom: 2rem; line-height: 1.4; }

        input {
            font-size: 3rem; width: 160px; padding: 10px;
            border: 5px solid #eee; border-radius: 20px;
            text-align: center; outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: #e73c7e; }

        .time-input { width: 90px; }
        .separator { font-size: 3rem; font-weight: bold; margin: 0 10px; }

        #hint-box {
            display: none; background: #f0faff; border: 2px dashed #23a6d5;
            border-radius: 20px; padding: 20px; margin-top: 25px;
            text-align: left; font-family: 'Courier New', monospace;
        }

        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<img src="assets/BernadoodleLogo.png" id="puppy-logo" alt="Math Puppy Mascot">

<div id="game-container">
    <h2 id="question-text">Loading magic problems...</h2>
    
    <div id="input-area" style="display:flex; justify-content:center; align-items:center; min-height: 100px;">
        </div>

    <div id="hint-box">
        <h4 style="margin:0; color:#23a6d5;">🛠 ENGINEERING BREAKDOWN:</h4>
        <div id="hint-steps" style="margin-top:10px; line-height:1.5;"></div>
    </div>

    <div id="progress" style="margin-top: 2rem; font-weight: bold; color: #aaa;">Question 1 of ...</div>
</div>

<script>
 const questions = [
        { 
            type: 'number', 
            text: "What number is 3 hundreds, 14 tens, and 2 ones?", 
            answer: "442",
            steps: ["3 Hundreds = 300", "14 Tens = 140", "300 + 140 + 2 = 442"]
        },
        { 
            type: 'time', 
            text: "The magic show starts at 4:15. It lasts for 30 minutes. What time does it end?", 
            answerH: "4", answerM: "45",
            steps: ["Start at 15 minutes.", "Add 30 minutes: 15 + 30 = 45.", "Final time: 4:45."]
        },
        { 
            type: 'number', 
            text: "A square garden has 7 rows of 7 flowers. How many flowers are there?", 
            answer: "49",
            steps: ["This is a Perfect Square!", "Multiply 7 x 7.", "7, 14, 21, 28, 35, 42, 49!"]
        },
        { 
            type: 'time', 
            text: "The library opens at 9:00 AM. If you arrive 45 minutes late, what time is it?", 
            answerH: "9", answerM: "45",
            steps: ["Start at the opening time: 9:00.", "Add the 45-minute delay to the 00 minutes.", "Combine the hour and the new minutes."]
        },
        { 
            type: 'time', 
            text: "Lunch is at 12:00 PM. If it's 11:30 AM now, how many minutes until lunch? (Enter as 0:MM)", 
            answerH: "0", answerM: "30",
            steps: ["Look at the minutes now: 30.", "There are 60 minutes in a whole hour.", "Find the difference between 60 and 30."]
        },
        { 
            type: 'time', 
            text: "A cake takes 50 minutes to bake. You put it in at 2:05. What time will it be done?", 
            answerH: "2", answerM: "55",
            steps: ["Start with the minutes: 05.", "Add the baking time: 50 minutes.", "Check if 05 + 50 is less than 60."]
        },
        { 
            type: 'time', 
            text: "Soccer practice starts at 3:30 and ends at 4:30. How many minutes long is practice? (Enter as 1:00 for 60m)", 
            answerH: "1", answerM: "00",
            steps: ["Practice starts at 3:30.", "Practice ends at 4:30.", "How many 'whole hours' passed between 3 and 4?"]
        },
        { 
            type: 'time', 
            text: "You wake up at 7:10 AM. It takes 25 minutes to get ready. What time are you finished?", 
            answerH: "7", answerM: "35",
            steps: ["Start at 10 minutes.", "Add the 25 minutes for getting ready.", "Add the total minutes back to the 7 o'clock hour."]
        },
        { 
            type: 'time', 
            text: "The bus arrives at 8:15. It is now 8:05. How many minutes until the bus gets here? (Enter as 0:MM)", 
            answerH: "0", answerM: "10",
            steps: ["Identify the goal: 15 minutes.", "Identify where you are: 05 minutes.", "Subtract the smaller minutes from the larger minutes."]
        },
        { 
            type: 'time', 
            text: "A cartoon starts at 10:45 and is 15 minutes long. What time does it end?", 
            answerH: "11", answerM: "00",
            steps: ["Start at 45 minutes.", "Add 15 minutes: 45 + 15.", "Since the total is 60, move the hour up by 1!"]
        },
        { 
            type: 'time', 
            text: "Dinner will be ready in 20 minutes. It is 5:50 PM now. What time is dinner?", 
            answerH: "6", answerM: "10",
            steps: ["Start at 50 minutes.", "Add 10 minutes to reach 60 (the next hour).", "You still have 10 more minutes left of the 20!"]
        },
        { 
            type: 'time', 
            text: "You started reading at 6:15 and stopped at 6:45. How many minutes did you read? (Enter as 0:MM)", 
            answerH: "0", answerM: "30",
            steps: ["The hour (6) stayed the same.", "Compare the end minutes (45) and the start minutes (15).", "Subtract 15 from 45."]
        },
        { 
            type: 'time', 
            text: "If the clock shows 1:25, what time was it 10 minutes ago?", 
            answerH: "1", answerM: "15",
            steps: ["Look at the minutes: 25.", "Since we are going 'back in time,' we subtract.", "Subtract 10 from 25."]
        },
        { 
            type: 'time', 
            text: "The big hand is on the 6 and the little hand is between 2 and 3. What time is it?", 
            answerH: "2", answerM: "30",
            steps: ["When the big hand is on the 6, it represents 30 minutes.", "The little hand between 2 and 3 means it's past 2, but not yet 3.", "Combine the hour and minutes."]
        },
        { 
            type: 'time', 
            text: "A train leaves at 11:10 and the trip takes 40 minutes. What time does it arrive?", 
            answerH: "11", answerM: "50",
            steps: ["Start with the minutes: 10.", "Add the trip duration: 40.", "Put that total back with the 11 o'clock hour."]
        },
        { 
            type: 'time', 
            text: "It is 1:55. What time will it be in 5 minutes?", 
            answerH: "2", answerM: "00",
            steps: ["Add 5 to 55.", "A total of 60 minutes means the hour must click forward.", "What comes after 1?"]
        },
        { 
            type: 'time', 
            text: "Recess starts at 10:20 and lasts 25 minutes. What time does it end?", 
            answerH: "10", answerM: "45",
            steps: ["Identify the starting minutes: 20.", "Add the length of recess: 25.", "Add that sum to the 10 o'clock hour."]
        },
        { 
            type: 'time', 
            text: "You have an appointment at 4:10. You arrive at 3:55. How many minutes early are you? (Enter as 0:MM)", 
            answerH: "0", answerM: "15",
            steps: ["From 3:55, it takes 5 minutes to get to 4:00.", "From 4:00, it takes 10 minutes to get to 4:10.", "Add those two small jumps together."]
        },
        { 
            type: 'number', 
            text: "A sticker costs 45 cents. You pay with 2 quarters. How much change should you get? (Enter as cents)", 
            answer: "5",
            steps: ["Step 1: Calculate your total money (2 quarters = 50 cents).", "Step 2: Compare 50 cents to the 45-cent cost.", "Step 3: Subtract to find what's left over!"]
        },
        { 
            type: 'number', 
            text: "You have 3 dimes, 2 nickels, and 4 pennies. How many cents do you have in total?", 
            answer: "44",
            steps: ["Step 1: Count the dimes (10, 20, 30).", "Step 2: Add the nickels (5 + 5 = 10).", "Step 3: Combine 30 + 10 and then add the 4 pennies."]
        },
        { 
            type: 'number', 
            text: "An apple costs 60 cents. You have 1 quarter and 2 dimes. How many more cents do you need?", 
            answer: "15",
            steps: ["Step 1: 1 quarter (25) + 2 dimes (20) = 45 cents.", "Step 2: The goal is 60 cents.", "Step 3: Find the jump from 45 up to 60."]
        },
        { 
            type: 'number', 
            text: "You find 4 quarters in your pocket. You spend 30 cents on a gumdrop. How many cents are left?", 
            answer: "70",
            steps: ["Step 1: 4 quarters is the same as 100 cents (or 1 dollar).", "Step 2: Subtract the 30 cents spent.", "Step 3: Calculate the final total."]
        },
        { 
            type: 'number', 
            text: "A toy car costs 85 cents. You have 3 quarters and 1 nickel. Do you have enough? How much more do you need? (Enter 0 if you have enough)", 
            answer: "5",
            steps: ["Step 1: 3 quarters = 75 cents.", "Step 2: Add the nickel (5 cents) to get 80.", "Step 3: Compare 80 to the cost of 85."]
        },
        { 
            type: 'number', 
            text: "You have 1 dollar. You buy a pencil for 25 cents and an eraser for 10 cents. How much change is left?", 
            answer: "65",
            steps: ["Step 1: Add the cost of the pencil and eraser together.", "Step 2: Remember 1 dollar = 100 cents.", "Step 3: Subtract the total cost from 100."]
        },
        { 
            type: 'number', 
            text: "How many nickels do you need to make 35 cents?", 
            answer: "7",
            steps: ["Step 1: Think of your 5 times tables.", "Step 2: Count by fives: 5, 10, 15, 20...", "Step 3: Stop when you hit 35 and count how many steps it took!"]
        },
        { 
            type: 'number', 
            text: "You have 5 dimes. You want to buy a candy bar for 75 cents. How many more quarters do you need?", 
            answer: "1",
            steps: ["Step 1: 5 dimes = 50 cents.", "Step 2: You need to reach 75 cents.", "Step 3: How many 25-cent 'jumps' get you from 50 to 75?"]
        },
        { 
            type: 'number', 
            text: "A notebook is 90 cents. You pay with 1 dollar. What is the fewest number of coins you can get back? (Hint: Think of the value first)", 
            answer: "10",
            steps: ["Step 1: Subtract 90 from 100 to find the change value.", "Step 2: Look at the answer and enter the number of cents."]
        },
        { 
            type: 'number', 
            text: "Which is worth more: 6 dimes or 2 quarters? Enter the value of the larger amount.", 
            answer: "60",
            steps: ["Step 1: Calculate 6 dimes (6 x 10).", "Step 2: Calculate 2 quarters (25 + 25).", "Step 3: Which number is higher?"]
        },
        { 
            type: 'number', 
            text: "You have 2 quarters, 3 dimes, and 1 nickel. How many cents away from 1 dollar are you?", 
            answer: "15",
            steps: ["Step 1: Add the quarters (50).", "Step 2: Add the dimes (30) and nickel (5) to get your total.", "Step 3: Subtract that total from 100."]
        },
        { 
            type: 'number', 
            text: "A balloon costs 12 cents. If you buy two balloons, how much change do you get from a 50-cent coin?", 
            answer: "26",
            steps: ["Step 1: Double the cost: 12 + 12.", "Step 2: Subtract that total from 50.", "Step 3: Check your subtraction twice!"]
        },
        { 
            type: 'number', 
            text: "You have 7 nickels and 5 pennies. How many cents do you have?", 
            answer: "40",
            steps: ["Step 1: Multiply 7 nickels by 5 cents.", "Step 2: Add the 5 pennies.", "Step 3: Total it up!"]
        },
        { 
            type: 'number', 
            text: "You want to buy a drink for 95 cents. You have 3 quarters and 2 dimes. How many more cents do you need?", 
            answer: "0",
            steps: ["Step 1: 3 quarters = 75.", "Step 2: Add 2 dimes (20) to 75.", "Step 3: Is 95 enough to cover the 95-cent cost?"]
        },
        { 
            type: 'number', 
            text: "If you swap 100 pennies for quarters, how many quarters would you get?", 
            answer: "4",
            steps: ["Step 1: 100 pennies = 1 dollar.", "Step 2: How many quarters make up 1 dollar?", "Step 3: Count by 25s to 100."]
        },
        { 
            type: 'money', text: "A shiny sticker costs 45 cents. You pay with 2 quarters. How much change do you get?", 
            answer: "5",
            steps: ["2 quarters is 50 cents.", "The sticker costs 45 cents.", "Find the difference between 50 and 45."]
        },
        { 
            type: 'money', text: "You have 3 dimes, 2 nickels, and 4 pennies. What is your total?", 
            answer: "44",
            steps: ["Count the dimes first (10, 20, 30).", "Add the 2 nickels (5 + 5).", "Finally, add the 4 pennies to that total."]
        },
        { 
            type: 'money', text: "A super-bounce ball is 80 cents. You have 3 quarters. How many more nickels do you need?", 
            answer: "1",
            steps: ["3 quarters equals 75 cents.", "You need to reach 80 cents.", "How many 5-cent nickels bridge that gap?"]
        },
        { 
            type: 'money', text: "You have $1.00. You buy a juice for 65 cents. How much change is left?", 
            answer: "35",
            steps: ["Think of $1.00 as 100 cents.", "Subtract the 65 cents spent.", "Calculate the remaining cents."]
        },
        { 
            type: 'money', text: "A toy car is 95 cents. You have 4 dimes and 2 quarters. Do you have enough?", 
            answer: "0", 
            steps: ["Calculate 2 quarters (50).", "Add the 4 dimes (40) to the 50.", "Compare 90 cents to the 95 cent cost."]
        },
        { 
            type: 'money', text: "How many quarters do you need to make exactly $1.50?", 
            answer: "6",
            steps: ["Remember 4 quarters make $1.00.", "How many more quarters make the extra 50 cents?", "Add those two counts together."]
        },
        { 
            type: 'money', text: "You find 2 dimes and 3 nickels on the sidewalk. How much money did you find?", 
            answer: "35",
            steps: ["Start with the 2 dimes (20 cents).", "Count up by 5s for the 3 nickels.", "What is the final sum?"]
        },
        { 
            type: 'money', text: "An eraser is 12 cents. You want to buy 3 of them. How much will it cost?", 
            answer: "36",
            steps: ["This is triple 12 (12 + 12 + 12).", "Break it down: 10+10+10 and 2+2+2.", "Add those two parts together."]
        },
        { 
            type: 'money', text: "You have a $1.00 bill. A candy bar is 75 cents. How many quarters do you get back in change?", 
            answer: "1",
            steps: ["Calculate 100 cents minus 75 cents.", "That gives you 25 cents change.", "How many quarters is 25 cents?"]
        },
        { 
            type: 'money', text: "Which is more: 8 nickels or 3 dimes? Enter the value of the bigger one.", 
            answer: "40",
            steps: ["8 nickels is 8 times 5.", "3 dimes is 3 times 10.", "Compare the two totals."]
        },
        { 
            type: 'money', text: "A bookmark is 55 cents. You pay with 1 quarter and 4 dimes. How much change do you get?", 
            answer: "10",
            steps: ["Add your money: 25 + 40.", "Subtract the 55 cent cost from your total.", "Calculate the remainder."]
        },
        { 
            type: 'money', text: "You have 10 pennies, 2 nickels, and 1 dime. How much do you have total?", 
            answer: "30",
            steps: ["10 pennies is 10 cents.", "2 nickels is 10 cents.", "Add those to the 10-cent dime."]
        },
        { 
            type: 'money', text: "If you have 40 cents, how many more dimes do you need to make $1.00?", 
            answer: "6",
            steps: ["You need 100 cents total.", "100 minus 40 leaves 60 cents needed.", "How many 10s go into 60?"]
        },
        { 
            type: 'money', text: "A pencil is 15 cents and a pen is 25 cents. How much for both?", 
            answer: "40",
            steps: ["Combine the tens: 10 + 20.", "Combine the ones: 5 + 5.", "Add the two results together."]
        },
        { 
            type: 'money', text: "You have $1.00. You buy a snack for 10 cents. If all your change is in dimes, how many do you have left?", 
            answer: "9",
            steps: ["$1.00 is 10 dimes.", "You spent the value of 1 dime.", "How many dimes are left?"]
        }
    ];

    let currentIdx = 0;
    const container = document.getElementById('game-container');
    const questionText = document.getElementById('question-text');
    const inputArea = document.getElementById('input-area');
    const progressText = document.getElementById('progress');
    const hintBox = document.getElementById('hint-box');
    const hintSteps = document.getElementById('hint-steps');

    function loadQuestion() {
        const q = questions[currentIdx];
        questionText.innerText = q.text;
        inputArea.innerHTML = '';
        hintBox.style.display = 'none';
        progressText.innerText = `Question ${currentIdx + 1} of ${questions.length}`;

        if (q.type === 'number' || q.type === 'money') {
            if (q.type === 'money') {
                const s = document.createElement('span'); s.innerText = '$'; s.style.fontSize = '3rem'; s.style.marginRight = '10px';
                inputArea.appendChild(s);
            }
            const input = document.createElement('input');
            input.type = 'number'; input.id = 'answer'; input.placeholder = "?";
            inputArea.appendChild(input);
            input.focus();
        } else if (q.type === 'time') {
            const hInput = document.createElement('input'); hInput.className = 'time-input'; hInput.id = 'hour'; hInput.placeholder = "H";
            const sep = document.createElement('span'); sep.className = 'separator'; sep.innerText = ':';
            const mInput = document.createElement('input'); mInput.className = 'time-input'; mInput.id = 'minute'; mInput.placeholder = "M";
            inputArea.appendChild(hInput); inputArea.appendChild(sep); inputArea.appendChild(mInput);
            hInput.focus();
            hInput.addEventListener('input', () => { if(hInput.value.length >= 1) mInput.focus(); });
        }
    }

    function checkAnswer() {
        const q = questions[currentIdx];
        let isCorrect = false;

        if (q.type === 'number' || q.type === 'money') {
            isCorrect = (document.getElementById('answer').value === q.answer);
        } else if (q.type === 'time') {
            const h = document.getElementById('hour').value;
            const m = document.getElementById('minute').value;
            isCorrect = (h == q.answerH && (m == q.answerM || (m == "0" && q.answerM == "00")));
        }

        if (isCorrect) {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                questionText.innerText = "🏆 You are an Engineering Math Wizard!";
                inputArea.innerHTML = "✨✨✨";
                progressText.innerText = "Challenge Complete!";
            }
        } else {
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 500);
            hintSteps.innerHTML = q.steps.map(s => `• ${s}<br>`).join('');
            hintBox.style.display = 'block';
        }
    }

    window.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkAnswer(); });
    loadQuestion();
</script>

</body>
</html>
