<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Math Adventure</title>
    <style>
        /* --- LOGO SECTION --- */
        #puppy-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 120px; /* Adjust size as needed */
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }
        /* --- LOGO SECTION END --- */
    
        #game-container {
            /* This ensures the puppy doesn't overlap on small screens */
            position: relative; 
            background: rgba(255, 255, 255, 0.9);
        :root {
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #9b59b6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Shifting Gradient Background */
        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
            transition: transform 0.2s ease;
        }

        h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .input-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input {
            font-size: 3rem;
            width: 150px;
            padding: 10px;
            border: 4px solid #ddd;
            border-radius: 15px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #e73c7e;
        }

        /* Special Time Input Styling */
        .time-input {
            width: 80px;
        }

        .separator {
            font-size: 3rem;
            font-weight: bold;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #progress {
            margin-top: 2rem;
            font-weight: bold;
            color: #666;
        }
    </style>
</head>
<body>
<img src="assets/BernadoodleLogo.png" id="puppy-logo" alt="Math Puppy Mascot">
<div id="game-container">
    <div id="question-box">
        <h2 id="question-text">Loading magic problems...</h2>
        </div>
</div>
<div id="game-container">
    <div id="question-box">
        <h2 id="question-text">Loading magic problems...</h2>
        <div id="input-area" class="input-wrapper">
            </div>
    </div>
    <div id="progress">Question 1 of 5</div>
</div>

<script>
  //  Question Structure with "Steps"
  const questions = [
      { 
          type: 'number', 
          text: "What number is 3 hundreds, 14 tens, and 2 ones?", 
          answer: "442",
          steps: [
              "Step 1: 3 Hundreds = 300",
              "Step 2: 14 Tens = 140",
              "Step 3: 300 + 140 + 2 = ?"
          ]
      },
      { 
          type: 'time', 
          text: "The magic show starts at 4:15. It lasts for 30 minutes. What time does it end?", 
          answerH: "4", answerM: "45",
          steps: [
              "Step 1: Start at 15 minutes.",
              "Step 2: Add 30 minutes to the 15.",
              "Step 3: Check if you crossed 60 (the next hour)!"
          ]
      }
  ];
  
  // In the checkAnswer() function:
  if (isCorrect) {
      hideHint();
      currentIdx++;
      // ... load next question
  } else {
      showHint(q.steps); // Trigger the breakdown!
      container.classList.add('shake');
  }

    let currentIdx = 0;

    const container = document.getElementById('game-container');
    const questionText = document.getElementById('question-text');
    const inputArea = document.getElementById('input-area');
    const progressText = document.getElementById('progress');

    function loadQuestion() {
        const q = questions[currentIdx];
        questionText.innerText = q.text;
        inputArea.innerHTML = '';
        progressText.innerText = `Question ${currentIdx + 1} of ${questions.length}`;

        if (q.type === 'number') {
            const input = document.createElement('input');
            input.type = 'number';
            input.id = 'answer';
            input.placeholder = "?";
            inputArea.appendChild(input);
            input.focus();
        } else if (q.type === 'time') {
            const hInput = document.createElement('input');
            hInput.className = 'time-input';
            hInput.id = 'hour';
            hInput.placeholder = "H";
            
            const sep = document.createElement('span');
            sep.className = 'separator';
            sep.innerText = ':';

            const mInput = document.createElement('input');
            mInput.className = 'time-input';
            mInput.id = 'minute';
            mInput.placeholder = "M";

            inputArea.appendChild(hInput);
            inputArea.appendChild(sep);
            inputArea.appendChild(mInput);
            
            hInput.focus();

            // Auto-tab logic for time
            hInput.addEventListener('input', () => {
                if (hInput.value.length >= 1 && parseInt(hInput.value) > 0) {
                    mInput.focus();
                }
            });
        }
    }

    function checkAnswer() {
        const q = questions[currentIdx];
        let isCorrect = false;

        if (q.type === 'number') {
            const val = document.getElementById('answer').value;
            if (val === q.answer) isCorrect = true;
        } else if (q.type === 'time') {
            const h = document.getElementById('hour').value;
            const m = document.getElementById('minute').value;
            if (h == q.answerH && m == q.answerM) isCorrect = true;
        }

        if (isCorrect) {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                questionText.innerText = "🎉 You are a Math Wizard!";
                inputArea.innerHTML = "";
                progressText.innerText = "Game Complete!";
            }
        } else {
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 500);
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });

    loadQuestion();
</script>

</body>
</html>
